<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" font-family="Arial, Helvetica, sans-serif">
  <title>TierMux — Usage tracking footer and T icon</title>

  <!-- Card background -->
  <rect width="720" height="200" rx="8" fill="#1E1E1E"/>
  <rect x="0.5" y="0.5" width="719" height="199" rx="8" fill="none" stroke="#3C3C3C" stroke-width="1"/>

  <!-- Header strip -->
  <text x="24" y="32" fill="#CCCCCC" font-size="13" font-weight="700">TierMux — chat footer</text>
  <text x="24" y="50" fill="#888888" font-size="11">Session tokens · est. $ saved · context window · lifetime totals</text>

  <!-- Footer line mockup -->
  <rect x="24" y="70" width="672" height="44" rx="6" fill="#252526" stroke="#3C3C3C"/>
  <text x="36" y="97" fill="#D4D4D4" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <tspan fill="#9CDCFE">Session:</tspan>
    <tspan> 12 req </tspan>
    <tspan fill="#808080">·</tspan>
    <tspan> 8.4k tokens </tspan>
    <tspan fill="#808080">·</tspan>
    <tspan> ctx </tspan>
    <tspan fill="#B5CEA8">~12</tspan>
    <tspan>/32k (</tspan>
    <tspan fill="#B5CEA8">38</tspan>
    <tspan>%)  </tspan>
    <tspan fill="#808080">·</tspan>
    <tspan>  </tspan>
    <tspan fill="#9CDCFE">Lifetime:</tspan>
    <tspan> 42k tokens </tspan>
    <tspan fill="#808080">·</tspan>
    <tspan> est. </tspan>
    <tspan fill="#B5CEA8">$0.58</tspan>
    <tspan> saved</tspan>
  </text>

  <!-- Usage data card mockup -->
  <rect x="24" y="128" width="320" height="56" rx="6" fill="#252526" stroke="#3C3C3C"/>
  <text x="36" y="148" fill="#FFFFFF" font-size="12" font-weight="700">Usage data</text>
  <text x="36" y="166" fill="#9CDCFE" font-size="11">Total tokens</text>
  <text x="332" y="166" fill="#D4D4D4" font-size="11" text-anchor="end">42k</text>
  <text x="36" y="180" fill="#9CDCFE" font-size="11">Est. $ saved</text>
  <text x="332" y="180" fill="#D4D4D4" font-size="11" text-anchor="end">$0.58</text>

  <!-- Clear button mockup -->
  <rect x="356" y="146" width="120" height="26" rx="4" fill="#0E639C"/>
  <text x="416" y="163" fill="#FFFFFF" font-size="11" text-anchor="middle">Clear usage data</text>

  <!-- T icon (the activity bar glyph, rendered large) -->
  <rect x="500" y="70" width="196" height="114" rx="6" fill="#252526" stroke="#3C3C3C"/>
  <g transform="translate(500, 70) scale(8.16)">
    <!-- T glyph in currentColor (rendered as white inside the dark card) -->
    <path fill="#FFFFFF" fill-rule="evenodd" d="
      M 1.5 1.5 L 22.5 1.5 L 20.5 4.5 L 1.5 4.5 Z
      M 1.5 7.5 L 22.5 7.5 L 20.5 10.5 L 1.5 10.5 Z
      M 1.5 13.5 L 22.5 13.5 L 20.5 16.5 L 1.5 16.5 Z
      M 9.5 4.5 L 9.5 22.5 L 14.5 22.5 L 14.5 4.5 Z
      M 12 5.5 L 7.5 11 L 10 11 L 10 20 L 14 20 L 14 11 L 16.5 11 Z
    "/>
  </g>
  <text x="598" y="172" fill="#888888" font-size="10" text-anchor="middle">Activity-bar icon</text>
</svg>
