<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <title>TierMux — T with stacked tiers and routing arrow (gradient)</title>

  <defs>
    <!-- Vertical gradient: top = light purple, bottom = deep blue -->
    <linearGradient id="tiermux-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B388FF"/>
      <stop offset="35%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#2962FF"/>
    </linearGradient>
    <!-- Subtle dark backdrop with rounded corners -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1A1A22"/>
      <stop offset="100%" stop-color="#0A0A10"/>
    </linearGradient>
    <!-- Soft outer glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="0" result="offsetblur"/>
      <feFlood flood-color="#7C4DFF" flood-opacity="0.6"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect x="0" y="0" width="256" height="256" rx="32" fill="url(#bg-grad)"/>
  <rect x="0.5" y="0.5" width="255" height="255" rx="32" fill="none" stroke="#2A2A35" stroke-width="1"/>

  <!-- T glyph in gradient, with the upward arrow cut out via fill-rule="evenodd".
       Same geometry as media/icon.svg, scaled to 256x256 and offset to leave
       a comfortable margin inside the rounded backdrop. -->
  <g transform="translate(28 28) scale(8.33)" filter="url(#glow)">
    <path fill="url(#tiermux-grad)" fill-rule="evenodd" d="
      M 1.5 1.5 L 22.5 1.5 L 20.5 4.5 L 1.5 4.5 Z
      M 1.5 7.5 L 22.5 7.5 L 20.5 10.5 L 1.5 10.5 Z
      M 1.5 13.5 L 22.5 13.5 L 20.5 16.5 L 1.5 16.5 Z
      M 9.5 4.5 L 9.5 22.5 L 14.5 22.5 L 14.5 4.5 Z
      M 12 5.5 L 7.5 11 L 10 11 L 10 20 L 14 20 L 14 11 L 16.5 11 Z
    "/>
  </g>
</svg>
